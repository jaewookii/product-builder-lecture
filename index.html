<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" aria-label="테마 전환">☀️</button>
        <h1>로또 번호 생성기</h1>
        <div id="numbers-container" aria-live="polite" aria-label="생성된 로또 번호"></div>
        <div class="button-group">
            <button id="generate-button">번호 생성</button>
            <button id="generate-five-button">5게임 번호 생성</button>
        </div>

        <div class="contact-section">
            <hr>
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/xaqkdkpw" method="POST">
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" aria-label="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용을 입력해주세요" aria-label="문의 내용" required></textarea>
                </div>
                <button type="submit" class="submit-button">문의 보내기</button>
            </form>
        </div>

        <div id="disqus_thread" class="comments-section"></div>
        <script>
            var disqus_config = function () {
                this.page.url = window.location.href;
                this.page.identifier = window.location.pathname;
            };
            (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://lotto-generator-1.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
    <script src="main.js" type="module"></script>
</body>
</html>
